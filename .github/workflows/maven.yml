# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://help.github.com/actions/language-and-framework-guides/building-and-testing-java-with-maven

name: Build Project

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:

    runs-on: ubuntu-latest
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
    - name: Require pom.xml version bump
      if: github.event_name == 'pull_request'
      shell: bash
      run: |
        git fetch origin main --depth=1
        current_version="$(grep -m1 '<version>' pom.xml | sed -E 's/.*<version>([^<]+)<\/version>.*/\1/')"
        base_version="$(git show origin/main:pom.xml | grep -m1 '<version>' | sed -E 's/.*<version>([^<]+)<\/version>.*/\1/')"

        echo "Current version: ${current_version}"
        echo "Main version: ${base_version}"

        if [ "${current_version}" = "${base_version}" ]; then
          echo "::error::pom.xml <version> must be changed before this pull request can pass deployment checks."
          exit 1
        fi
    - name: Build and test
      run: mvn -B clean verify
    - name: Analyze with SonarCloud
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: mvn -B sonar:sonar -Dsonar.host.url=https://sonarcloud.io -Dsonar.organization=naufaldzull -Dsonar.projectKey=naufaldzull_CI-CD_Deployment
