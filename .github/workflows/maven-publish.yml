# This workflow will build a package using Maven and then publish it to GitHub Packages
# For more information see: https://github.com/actions/setup-java/blob/main/docs/advanced-usage.md#apache-maven-with-a-settings-path

name: Maven Package

on:
  push:
    branches: [ main ]
  release:
    types: [created]
  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 2
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
        server-id: github # Value of the distributionManagement/repository/id field of the pom.xml
        settings-path: ${{ github.workspace }} # location for the settings.xml file

    - name: Require pom.xml version bump before deploy
      if: github.event_name == 'push'
      shell: bash
      run: |
        current_version="$(grep -m1 '<version>' pom.xml | sed -E 's/.*<version>([^<]+)<\/version>.*/\1/')"
        previous_version="$(git show HEAD^:pom.xml | grep -m1 '<version>' | sed -E 's/.*<version>([^<]+)<\/version>.*/\1/')"

        echo "Current version: ${current_version}"
        echo "Previous version: ${previous_version}"

        if [ "${current_version}" = "${previous_version}" ]; then
          echo "::error::pom.xml <version> must be changed before deployment can run."
          exit 1
        fi

    - name: Publish to GitHub Packages Apache Maven
      run: mvn -B clean deploy -s $GITHUB_WORKSPACE/settings.xml
      env:
        GITHUB_TOKEN: ${{ github.token }}
